services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: pedebrasa-api
    ports:
      - "${API_PORT:-3001}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET:-change-this-in-production}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-1d}
      - DB_PATH=/data/pedebrasa.sqlite
      - DB_LOGGING=false
      - CORS_ORIGIN=${CORS_ORIGIN:-*}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:${WEB_PORT:-3000}}
    volumes:
      - ./backend/data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: "http://localhost:${API_PORT:-3001}/api"
    container_name: pedebrasa-frontend
    depends_on:
      - api
    environment:
      - NODE_ENV=production
    ports:
      - "${WEB_PORT:-3000}:3000"
    restart: unless-stopped

